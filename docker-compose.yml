
services:
  # Label Studio
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: labely-label-studio
    ports:
      - "8080:8080"
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/data
      - DJANGO_DB=default
      - POSTGRE_NAME=labelstudio
      - POSTGRE_USER=labelstudio
      - POSTGRE_PASSWORD=labelstudio
      - POSTGRE_HOST=postgres
      - POSTGRE_PORT=5432
    volumes:
      - label-studio-data:/label-studio/data
      - ./data:/label-studio/data/upload:ro
    depends_on:
      - postgres
    networks:
      - labely-network
    restart: unless-stopped

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: labely-postgres
    environment:
      - POSTGRES_DB=labelstudio
      - POSTGRES_USER=labelstudio
      - POSTGRES_PASSWORD=labelstudio
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - labely-network
    restart: unless-stopped

  # SAM3 推理服务（纯推理，无 Label Studio 依赖）
  sam3-inference:
    build:
      context: .
      dockerfile: services/sam3_inference/Dockerfile
    container_name: labely-sam3-inference
    ports:
      - "8000:8000"
    environment:
      - DEVICE=${DEVICE:-cuda:0}
      - DEBUG=false
      - HF_TOKEN=${HF_TOKEN}
      - SAM3_TEXT_PROMPT=${SAM3_TEXT_PROMPT:-segment all objects}
    volumes:
      - ${HF_HOST_CACHE:-~/.cache/huggingface}:/root/.cache/huggingface
    networks:
      - labely-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # Label Studio ML 适配器（轻量级）
  ls-adapter:
    build:
      context: .
      dockerfile: services/ls_adapter/Dockerfile
    container_name: labely-ls-adapter
    ports:
      - "9090:9090"
    environment:
      - SAM3_INFERENCE_URL=http://sam3-inference:8000
      - LOG_LEVEL=INFO
      - LABEL_STUDIO_ACCESS_TOKEN=${LABEL_STUDIO_ACCESS_TOKEN}
      - LABEL_STUDIO_URL=http://label-studio:8080
    
    depends_on:
      - sam3-inference
    networks:
      - labely-network
    restart: unless-stopped

volumes:
  label-studio-data:
  postgres-data:

networks:
  labely-network:
    driver: bridge
